<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flatten Array - Both Methods</title>
</head>
<body>
    <script>
        let nestedArray = [[1, 2], [3, 4], [5, 6]];

        // ==========================================
        // Method 1: Using .flatMap()
        // ==========================================
        let resultWithMethod = nestedArray.flatMap(item => item);
        
        console.log("Method 1 (.flatMap):", resultWithMethod);


        // ==========================================
        // Method 2: Using Loops (for...of)
        // ==========================================
        let flatArray = [];

        for (let subArray of nestedArray) {
            for (let num of subArray) {
                flatArray.push(num);
            }
        }

        console.log("Method 2 (Loops):", flatArray);
    </script>
</body>
</html>
