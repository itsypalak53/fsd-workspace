<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>forEach Loop Push</title>
</head>
<body>

    <script>
        let arr = [3, 5, 7, 2, 7, 8];
        let newarr = [];

        arr.forEach(function (value, index) {
            newarr.push(value);
        });

        console.log(newarr);
    </script>

</body>
</html>
