        // --- Block 1: Individual Item Check (Method Done by Sir in Class)---
        let food = prompt("enter food name")

        switch (food) {
            case "apple":
            case "banana":
            case "mango":
                console.log("fruits");
                break;
            case "carrot":
            case "potato":
                console.log("vegetables");
                break;
            default:
                console.log("not a fruit");
        }


        // --- Block 2: Group Classification Check (Merged)  ---
        let classificationInput = prompt("Enter 'fruit' or 'vegetable':");

        switch (classificationInput) {
            case "fruit":
                console.log("mango, apple, banana");
                break;

            case "vegetable":
                console.log("potato, tomato, onion");
                break;

            default:
                console.log("Invalid group entered");
        }
