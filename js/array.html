<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array</title>
</head>

<body>
    <h1>Array</h1>
    <script>
        // 0, 1  2  3      4
        let arr = [1, 2, 3, true, [12, 4, 6], null, "palak"] // mixed type datatype
        // console.log(arr[6]);
        // console.log(arr.length);
        // console.log(arr[3]);
        // console.log(arr[4][0]);
        
        arr.push("hello guys") // add element at last
        console.log(arr);
        
        arr.pop() // remove last element
        console.log(arr);
        
        arr.unshift("hi palak") // add element at first
        console.log(arr);
        
        arr.shift() // remove first element
        console.log(arr);

        arr[0] ="hello" // add element at index 0
        console.log(arr);
        
        arr[10] = "last 10 index" // add element at index 10
        console.log(arr);
        
    </script>
</body>

</html>
